<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plataforma — Sistemas Digitais</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b1220;
      color:#e8eefc;
    }

    .wrap{
      max-width:1000px;
      margin:auto;
      padding:30px;
      text-align:center;
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#aaa;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:#111b33;
      padding:20px;
      border-radius:12px;
      text-decoration:none;
      color:white;
      transition:.2s;
      border:1px solid rgba(255,255,255,.1);
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#6ae4ff;
    }

    .tag{
      font-size:12px;
      color:#6ae4ff;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="wrap">
  <h1>Plataforma de Jogos</h1>
  <p>Escolha um módulo para iniciar sua prática em Sistemas Digitais</p>

  <section class="grid">

    <a class="card" href="game-numeracao-1.html">
      <div class="tag">Módulo 1</div>
      <h2>Sistemas de Numeração — Parte 1</h2>
      <p>
        Introdução às conversões entre decimal, binário, hexadecimal e octal.
      </p>
    </a>

    <a class="card" href="game-numeracao-2.html">
      <div class="tag">Módulo 2</div>
      <h2>Sistemas de Numeração — Parte 2</h2>
      <p>
        Desafios avançados com bits, bases e validação numérica.
      </p>
    </a>

  </section>
</div>

</body>
</html>
